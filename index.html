async function savePushSubscription(sub) {
  const id = btoa(sub.endpoint).slice(0, 32).replace(/[^a-zA-Z0-9]/g, '');
  await writeFirebase(`${PUSH_SUBS_PATH}/${id}`, {
    endpoint: sub.endpoint,

      auth: sub.toJSON().keys.auth

  });
}

}

    console.warn('Push failed:', e);
  }
}

// Simple password hash (good enough for friend group)
function hashPw(password) {
  const str = password + "GLuS_2026_salt";
  let h = 5381;
  for (let i = 0; i < str.length; i++) {
    h = (h << 5) + h ^ str.charCodeAt(i);
    h = h & h;
  }
  return Math.abs(h).toString(36);
}

  let es;
  try {
    es = new EventSource(url);
  } catch (e) {
    console.error("Firebase SSE failed:", e);
    return null;
  }
  es.addEventListener("put", event => {
    try {
      const msg = JSON.parse(event.data);
      // msg = { path: "/", data: {...} }
      // We only care about full root updates here
      if (msg.path === "/") {
        onUpdate(msg.data);
      } else {
        // Partial update — refetch full state to be safe
        fetchFirebase(path).then(d => onUpdate(d));
      }
    } catch (e) {
      console.error("Firebase parse error:", e);
    }
  });
  es.addEventListener("patch", () => {
    fetchFirebase(path).then(d => onUpdate(d));
  });
  es.onerror = e => {
    console.warn("Firebase SSE error (will reconnect):", e);
  };
  return es;
}
function fetchFirebase(path) {
  return fetch(`${FIREBASE_DB_URL}/${path}.json`).then(r => r.ok ? r.json() : null).catch(e => {
    console.error("Firebase fetch error:", e);
    return null;
  });
}
function writeFirebase(path, data) {
  return fetch(`${FIREBASE_DB_URL}/${path}.json`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  }).catch(e => console.error("Firebase write error:", e));
}

// Save a timestamped backup. Limits to last 20 backups.
async function saveBackup(state, reason = "auto") {
  if (!state) throw new Error("Kein State zum Sichern.");
  const ts = Date.now();
  const key = `liga_backup_${ts}`;
  const meta = {
    ts,
    reason,
    players: (state.players || []).length,
    matches: (state.matches || []).length
  };
  // Save backup
  const response = await fetch(`${FIREBASE_DB_URL}/backups/${key}.json`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      ...state,
      _meta: meta
    })
  });
  if (!response.ok) {
    throw new Error("Firebase antwortete mit Status " + response.status);
  }
  // Prune old backups (keep last 20) — best-effort
  try {
    const allBackups = await fetchFirebase("backups");
    if (allBackups) {
      const keys = Object.keys(allBackups).sort();
      if (keys.length > 20) {
        const toDelete = keys.slice(0, keys.length - 20);
        for (const k of toDelete) {
          fetch(`${FIREBASE_DB_URL}/backups/${k}.json`, {
            method: "DELETE"
          }).catch(() => {});
        }
      }
    }
  } catch (e) {/* ignore prune errors */}
  return key;
}

// List all backups (returns sorted array)
async function listBackups() {
  const data = await fetchFirebase("backups");
  if (!data) return [];
  return Object.entries(data).map(([key, value]) => ({
    key,
    ts: value?._meta?.ts || parseInt(key.replace("liga_backup_", "")) || 0,
    reason: value?._meta?.reason || "auto",
    playersCount: value?._meta?.players ?? (value?.players || []).length,
    matchesCount: value?._meta?.matches ?? (value?.matches || []).length,
    state: value
  })).sort((a, b) => b.ts - a.ts);
}

// Compute "data magnitude" — a rough estimate of how much data is in a state.
// Used to detect if an incoming write would destroy lots of data.
function dataMagnitude(state) {
  if (!state) return 0;
  const players = (state.players || []).length;
  const matches = (state.matches || []).length;
  const archives = (state.archive || []).length;
  // Weighted: matches are the most "expensive" to lose
  return players * 10 + matches * 50 + archives * 100;
}

// Build leagueConfig array of given length, preserving existing entries
function ensureLeagueConfig(numLeagues, existing) {
  const out = [];
  for (let i = 0; i < numLeagues; i++) {
    const e = (existing || [])[i] || {};
    out.push({
      promote: i === 0 ? 0 : e.promote ?? 2,
      relegate: i === numLeagues - 1 ? 0 : e.relegate ?? 2,
      gamesPerPair: e.gamesPerPair ?? 2
    });
  }
  return out;
}

// Generate a consistent color from a name
function getAvatarColor(name) {
  if (!name) return "#5a8a5a";
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  const colors = ["#e07a5f", "#81b29a", "#f2cc8f", "#3d5a80", "#ee6c4d", "#a8dadc", "#f4a261", "#9d8189", "#bc6c25", "#6a994e", "#bc4749", "#577590", "#f9844a", "#43aa8b", "#90be6d", "#f3722c"];
  return colors[Math.abs(hash) % colors.length];
}
function getInitials(name) {
  if (!name) return "?";
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

// Resize and compress image to base64 for storage in Firebase
function resizeImageToBase64(file, maxSize = 200) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        // Square crop from center
        const size = Math.min(img.width, img.height);
        const sx = (img.width - size) / 2;
        const sy = (img.height - size) / 2;
        const canvas = document.createElement("canvas");
        canvas.width = maxSize;
        canvas.height = maxSize;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, sx, sy, size, size, 0, 0, maxSize, maxSize);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Calculate achievements for a single player
function calcAchievements(playerId, players, matches, archive, tournamentWinners) {
  const earned = new Set();
  const details = {}; // achievementId -> detail string (who/when/what)
  const player = players.find(p => p.id === playerId);
  if (!player) return {
    earned,
    details
  };
  const playerById = Object.fromEntries((players || []).map(p => [p.id, p]));
  const getName = id => playerById[id]?.name || id;

  // Combine current + archived matches (lifetime) — exclude fun games for achievements
  const allMatchesRaw = [...(matches || []).filter(m => !m.isFunGame), ...(archive || []).flatMap(a => a.matches || []).filter(m => !m.isFunGame)];
  const playerMatches = allMatchesRaw.filter(m => m.winner && (m.playerA === playerId || m.playerB === playerId)).sort((a, b) => (a.date || 0) - (b.date || 0));
  if (playerMatches.length === 0) {
    const anyMatch = allMatchesRaw.find(m => m.playerA === playerId || m.playerB === playerId);
    if (anyMatch) earned.add("premiere");
    return applyManualAchievementOverrides({
      earned,
      details
    }, player, allMatchesRaw, playerId);
  }
  earned.add("premiere");
  let cupsFor = 0,
    wins = 0,
    losses = 0;
  let currentWinStreak = 0,
    maxWinStreak = 0,
    maxWinStreakEnd = null;
  let currentLossStreak = 0,
    maxLossStreak = 0;
  let knockout = false,
    knockoutOpp = null;
  let wuerfellaune = false,
    wuerfelopponent = null;
  let theGood = false,
    theBad = false,
    theUgly = false;
  let theGoodOpp = null,
    theBadOpp = null,
    theUglyOpp = null;
  let blitzkrugDay = null;
  const winsByDay = {};
  const opponentLossStreakVsMe = {};
  let tollpatsch = false;
  for (const m of playerMatches) {
    const isA = m.playerA === playerId;
    const myCups = isA ? m.cupsA : m.cupsB;
    const oppCups = isA ? m.cupsB : m.cupsA;
    const won = isA && m.winner === "A" || !isA && m.winner === "B";
    const opponentId = isA ? m.playerB : m.playerA;
    cupsFor += myCups;

    // Tollpatsch — own cup knocked over
    if (m.ownCupKnockedBy === playerId) tollpatsch = true;
    if (won) {
      wins++;
      currentWinStreak++;
      currentLossStreak = 0;
      if (currentWinStreak > maxWinStreak) {
        maxWinStreak = currentWinStreak;
        maxWinStreakEnd = opponentId;
      }
      if (myCups === 10 && oppCups === 0) {
        knockout = true;
        knockoutOpp = opponentId;
      }
      // Mexican Standoff achievements (win)
      if (myCups === 11 && oppCups === 10) {
        theGood = true;
        theGoodOpp = opponentId;
      }
      if (myCups === 12 && oppCups === 11) {
        theBad = true;
        theBadOpp = opponentId;
      }
      if (myCups === 13 && oppCups === 12) {
        theUgly = true;
        theUglyOpp = opponentId;
      }
      opponentLossStreakVsMe[opponentId] = (opponentLossStreakVsMe[opponentId] || 0) + 1;
      if (m.date) {
        const day = new Date(m.date).toISOString().slice(0, 10);
        winsByDay[day] = (winsByDay[day] || 0) + 1;
        if (winsByDay[day] >= 3) blitzkrugDay = day;
      }
    } else {
      losses++;
      currentLossStreak++;
      currentWinStreak = 0;
      if (currentLossStreak > maxLossStreak) maxLossStreak = currentLossStreak;
      if (myCups === 0 && oppCups >= 10) {
        wuerfellaune = true;
        wuerfelopponent = opponentId;
      }
      opponentLossStreakVsMe[opponentId] = 0;
    }
  }

  // Rivale: anyone you're tied with in H2H wins (both > 0)
  const rivalOpps = [];
  for (const m of playerMatches) {
    const isA = m.playerA === playerId;
    const opponentId = isA ? m.playerB : m.playerA;
    // count H2H wins for both sides
    if (!rivalOpps._tracked) rivalOpps._tracked = {};
  }
  // Build H2H wins map
  const h2hWinsForMe = {},
    h2hWinsForOpp = {};
  for (const m of playerMatches) {
    const isA = m.playerA === playerId;
    const opponentId = isA ? m.playerB : m.playerA;
    const won = isA && m.winner === "A" || !isA && m.winner === "B";
    h2hWinsForMe[opponentId] = (h2hWinsForMe[opponentId] || 0) + (won ? 1 : 0);
    h2hWinsForOpp[opponentId] = (h2hWinsForOpp[opponentId] || 0) + (won ? 0 : 1);
  }
  const currentRivals = Object.keys(h2hWinsForMe).filter(oppId => h2hWinsForMe[oppId] > 0 && h2hWinsForMe[oppId] === h2hWinsForOpp[oppId]);
  if (currentRivals.length > 0) {
    earned.add("rivale");
    details.rivale = currentRivals.map(id => `${getName(id)} (${h2hWinsForMe[id]}:${h2hWinsForOpp[id]})`);
  }
  if (wins > 0) earned.add("first_win");
  if (knockout) {
    earned.add("knockout");
    details.knockout = [`gegen ${getName(knockoutOpp)}`];
  }
  if (wuerfellaune) {
    earned.add("wuerfellaune");
    details.wuerfellaune = [`gegen ${getName(wuerfelopponent)}`];
  }
  if (maxWinStreak >= 5) {
    earned.add("hopfenhoernchen");
    details.hopfenhoernchen = [`${maxWinStreak} Siege in Folge`];
  }
  if (maxWinStreak >= 10) {
    earned.add("brandstifter");
    details.brandstifter = [`${maxWinStreak} Siege in Folge`];
  }
  if (blitzkrugDay) {
    earned.add("blitzkrug");
    details.blitzkrug = [`am ${blitzkrugDay}`];
  }
  if (theGood) {
    earned.add("the_good");
    details.the_good = [`gegen ${getName(theGoodOpp)}`];
  }
  if (theBad) {
    earned.add("the_bad");
    details.the_bad = [`gegen ${getName(theBadOpp)}`];
  }
  if (theUgly) {
    earned.add("the_ugly");
    details.the_ugly = [`gegen ${getName(theUglyOpp)}`];
  }
  if (tollpatsch) earned.add("tollpatsch");
  if (cupsFor >= 50) earned.add("cups_50");
  if (cupsFor >= 100) earned.add("cups_100");
  if (cupsFor >= 250) earned.add("cups_250");
  if (cupsFor >= 500) earned.add("cups_500");
  if (cupsFor >= 750) earned.add("cups_750");
  if (cupsFor >= 1000) earned.add("cups_1000");
  const totalGames = wins + losses;
  if (totalGames >= 5) earned.add("games_5");
  if (totalGames >= 10) earned.add("games_10");
  if (totalGames >= 25) earned.add("games_25");
  if (totalGames >= 50) earned.add("games_50");
  if (totalGames >= 75) earned.add("games_75");
  if (totalGames >= 100) earned.add("games_100");
  if (maxLossStreak >= 5) earned.add("saure_gurke");
  if (maxLossStreak >= 10) earned.add("zigeunerfluch");

  // Angstgegner: DYNAMIC — only active if someone currently has 3+ consecutive losses against me
  const currentAngstOpps = Object.entries(opponentLossStreakVsMe).filter(([, streak]) => streak >= 3).map(([id]) => id);
  if (currentAngstOpps.length > 0) {
    earned.add("angstgegner");
    details.angstgegner = currentAngstOpps.map(id => `${getName(id)} verliert gerade immer gegen dich`);
  }

  // Archive-based achievements
  let prevSeasonLiga1Win = false;
  for (const a of archive || []) {
    const fs = a.finalStandings || [];
    for (const ld of fs) {
      const standings = ld.standings || [];
      if (standings.length > 0 && standings[standings.length - 1].id === playerId) {
        earned.add("tabellenkeller");
        details.tabellenkeller = [...(details.tabellenkeller || []), `in ${a.seasonName || "einer Saison"}`];

      if (standings.length > 0 && standings[0].id === playerId && ld.league === 0) {
        earned.add("staakens_bester");
        details.staakens_bester = [...(details.staakens_bester || []), a.seasonName || "eine Saison"];
        if (prevSeasonLiga1Win) earned.add("titelverteidiger");
        prevSeasonLiga1Win = true;
      } else if (ld.league === 0) {
        prevSeasonLiga1Win = false;

// Calculate stats from last N games (across all seasons including archive)
function calcLifetimeStatsLastN(playerId, currentMatches, archive, n = 50) {
  const allMatches = [...(currentMatches || []), ...(archive || []).flatMap(a => a.matches || [])].filter(m => m.winner && (m.playerA === playerId || m.playerB === playerId)).sort((a, b) => (b.date || 0) - (a.date || 0)).slice(0, n);
  let games = 0,
    wins = 0,
    losses = 0,
    cupsFor = 0,
    cupsAgainst = 0;
  for (const m of allMatches) {
    const isA = m.playerA === playerId;
    games++;
    cupsFor += isA ? m.cupsA : m.cupsB;
    cupsAgainst += isA ? m.cupsB : m.cupsA;
    const won = isA && m.winner === "A" || !isA && m.winner === "B";
    if (won) wins++;else losses++;
  }
  return {
    games,
    wins,
    losses,
    cupsFor,
    cupsAgainst,
    diff: cupsFor - cupsAgainst
  };
}

// Skill-Score for a player — used to derive betting odds.
// Higher score = better player. Bayesian smoothing for low game counts.
function calcSkillScore(s) {
  if (!s) return 0.5;
  const games = s.games || 0;
  // Bayesian prior: assume 50% winrate over 5 phantom games
  const prior = 5;
  const adjustedWinRate = (s.wins + prior * 0.5) / (games + prior);
  // Diff per game (10:0 = +10, balanced = 0)
  const diffPerGame = games > 0 ? (s.cupsFor - s.cupsAgainst) / games : 0;
  // Normalize diff to roughly 0-1 (assume max diff ~ +/- 10)
  const normDiff = Math.max(-1, Math.min(1, diffPerGame / 10));
  // Combine: 70% win rate weight, 30% diff weight
  const score = adjustedWinRate * 0.7 + (normDiff + 1) / 2 * 0.3;
  return Math.max(0.05, Math.min(0.95, score));
}

// ============ ELO RATING SYSTEM ============
// Basiert auf World Football Elo Ratings (eloratings.net), angepasst für Beer Pong
// Startrating 1000, K=32, Cup-Differenz-Multiplikator G
const ELO_START = 1000;
const ELO_K = 32;

const ELO_RANKS = [{

}];
function getEloRank(elo) {
  const r = ELO_RANKS.find(r => elo >= r.min) || ELO_RANKS[ELO_RANKS.length - 1];
  return {
    ...r,
    img: typeof r.img === 'function' ? r.img() : r.img
  };
}
function eloGFactor(cupDiff) {
  const d = Math.abs(cupDiff);
  if (d <= 3) return 1.0;
  if (d <= 6) return 1.5;
  if (d <= 9) return 1.75;
  return 2.0;
}

// Berechnet ELO für alle Spieler chronologisch über alle Matches (aktuell + Archiv)
// Gibt Map { playerId: { elo, games, peak } } zurück
function calcEloRatings(players, currentMatches, archive) {
  const toArr = v => Array.isArray(v) ? v : Object.values(v || {});
  const arcMatches = toArr(archive).flatMap(a => toArr(a.matches));
  const allMatches = [...arcMatches, ...toArr(currentMatches)].filter(m => m && m.winner && !m.isFunGame && m.playerA && m.playerB).sort((a, b) => (a.date || 0) - (b.date || 0)); // chronologisch!

  const elo = {};
  const ensure = id => {
    if (!elo[id]) elo[id] = {
      elo: ELO_START,
      games: 0,
      peak: ELO_START
    };
    return elo[id];
  };
  for (const m of allMatches) {
    const a = ensure(m.playerA),
      b = ensure(m.playerB);
    const cupDiff = (m.cupsA || 0) - (m.cupsB || 0);
    const We_a = 1 / (Math.pow(10, -(a.elo - b.elo) / 400) + 1);
    const W_a = m.winner === "A" ? 1 : 0;
    const G = eloGFactor(cupDiff);
    const delta = Math.round(ELO_K * G * (W_a - We_a));
    a.elo += delta;
    b.elo -= delta;
    a.games++;
    b.games++;
    if (a.elo > a.peak) a.peak = a.elo;
    if (b.elo > b.peak) b.peak = b.elo;
  }
  return elo;
}
// ============ END ELO ============

// Setzlisten-Score: basiert auf ELO-Rating
// Gibt normalisierten Score zurück (ELO/1000 → ~0.8-1.4) oder null wenn keine Spiele
function calcSeedScore(playerId, eloMap) {
  const e = eloMap[playerId];
  if (!e || e.games === 0) return null;
  return e.elo;
}
function loadSeedStats() {
  const d = loadLiga() || {};
  const toArr = v => Array.isArray(v) ? v : Object.values(v || {});
  const ps = toArr(d.players);
  const ms = toArr(d.matches);
  const arc = toArr(d.archive);
  return calcEloRatings(ps, ms, arc);
}
function calcOdds(score) {
  // Probability → Odds: odds = 1 / probability, with house edge of ~5%
  if (score <= 0) return 99.99;
  const prob = score * 0.95; // tiny house edge
  return Math.max(1.05, 1 / prob);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function generateMatches(n, withRematch = false) {
  const matches = [];
  for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) {
    matches.push({
      a: i,
      b: j,
      cupsA: 0,
      cupsB: 0,
      winner: null
    });
    if (withRematch) matches.push({
      a: j,
      b: i,
      cupsA: 0,
      cupsB: 0,
      winner: null,
      isRematch: true
    });
  }
  return matches;
}
function getStandings(group, advPerGroup) {
  const teams = Array.isArray(group.teams) ? group.teams : Object.values(group.teams || {});
  const matches = Array.isArray(group.matches) ? group.matches : Object.values(group.matches || {});
  const stats = teams.map((name, i) => ({
    name,
    i,
    wins: 0,
    cupsFor: 0,
    cupsAgainst: 0
  }));
  for (const m of matches) {
    // winner must be exactly "A" or "B" to count — not null, not a number, not anything else
    if (m.winner !== "A" && m.winner !== "B") continue;
    const ia = m.a ?? m.home ?? 0;
    const ib = m.b ?? m.away ?? 1;
    if (ia >= stats.length || ib >= stats.length) continue;
    stats[ia].cupsFor += m.cupsA ?? m.cupsHome ?? 0;
    stats[ia].cupsAgainst += m.cupsB ?? m.cupsAway ?? 0;
    stats[ib].cupsFor += m.cupsB ?? m.cupsAway ?? 0;
    stats[ib].cupsAgainst += m.cupsA ?? m.cupsHome ?? 0;
    if (m.winner === "A") stats[ia].wins++;else stats[ib].wins++;
  }
  return stats.map(s => ({
    ...s,
    diff: s.cupsFor - s.cupsAgainst
  })).sort((a, b) => b.wins - a.wins || b.diff - a.diff || b.cupsFor - a.cupsFor || a.name.localeCompare(b.name));
}

// Build KO bracket directly from a list of players/teams (no groups)
function buildKOMatchesDirect(players, koSize, koRounds) {
  const seeded = [...players];
  while (seeded.length < koSize) seeded.push(null);
  const matches = [];
  // First round
  for (let i = 0; i < koSize / 2; i++) {
    matches.push({
      id: `ko_0_${i}`,
      round: 0,
      slot: i,
      teamA: seeded[i * 2] ? {
        name: seeded[i * 2].name
      } : null,
      teamB: seeded[i * 2 + 1] ? {
        name: seeded[i * 2 + 1].name
      } : null,
      cupsA: 0,
      cupsB: 0,
      winner: null
    });
  }
  // Later rounds (TBD)
  for (let r = 1; r < koRounds; r++) {
    const count = koSize / Math.pow(2, r + 1);
    for (let i = 0; i < count; i++) {
      matches.push({
        id: `ko_${r}_${i}`,
        round: r,
        slot: i,
        teamA: null,
        teamB: null,
        cupsA: 0,
        cupsB: 0,
        winner: null
      });
    }
  }
  // 3rd place match
  matches.push({
    id: "p3",
    round: koRounds - 1,
    slot: 99,
    teamA: null,
    teamB: null,
    cupsA: 0,
    cupsB: 0,
    winner: null,
    isP3: true
  });
  return matches;
}
function buildKOMatches(groups, advPerGroup, koSize, koRounds) {
  const seeds = [];
  for (let rank = 0; rank < advPerGroup; rank++) for (let gi = 0; gi < groups.length; gi++) {
    const st = getStandings(groups[gi], advPerGroup);
    if (st[rank]) seeds.push({
      name: st[rank].name,
      group: gi
    });
  }
  const ms = [];
  const half = koSize / 2;
  for (let i = 0; i < half; i++) ms.push({
    id: `r0m${i}`,
    round: 0,
    idx: i,
    teamA: seeds[i] ?? null,
    teamB: seeds[koSize - 1 - i] ?? null,
    cupsA: "",
    cupsB: "",
    winner: null
  });
  for (let r = 1; r < koRounds; r++) {
    const prev = ms.filter(m => m.round === r - 1);
    for (let i = 0; i < prev.length / 2; i++) ms.push({
      id: `r${r}m${i}`,
      round: r,
      idx: i,
      teamA: null,
      teamB: null,
      cupsA: "",
      cupsB: "",
      winner: null
    });
  }
  // 3rd place match: between the two semifinal losers (only if we have a semifinal)
  if (koRounds >= 2) {
    ms.push({
      id: "p3",
      round: -1,
      idx: 0,
      teamA: null,
      teamB: null,
      cupsA: "",
      cupsB: "",
      winner: null,
      isThirdPlace: true
    });
  }
  return ms;
}
function resolveKO(koMatches, koRounds) {
  if (!koMatches) return [];
  const ms = koMatches.map(m => ({
    ...m
  }));
  function winner(m) {
    if (!m.winner) {
      // Byes only auto-advance if explicitly confirmed (winner set to "BYE")
      if (m.byeConfirmed && m.teamA && !m.teamB) return m.teamA;
      if (m.byeConfirmed && m.teamB && !m.teamA) return m.teamB;
      return null;
    }
    return m.winner === "A" ? m.teamA : m.teamB;
  }
  function loser(m) {
    if (!m.winner) return null;
    return m.winner === "A" ? m.teamB : m.teamA;
  }
  for (let r = 1; r < koRounds; r++) {
    const prev = ms.filter(m => m.round === r - 1 && m.id !== "p3").sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0));
    ms.filter(m => m.round === r && m.id !== "p3").sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0)).forEach((tm, i) => {
      tm.teamA = prev[i * 2] ? winner(prev[i * 2]) : null;
      tm.teamB = prev[i * 2 + 1] ? winner(prev[i * 2 + 1]) : null;
    });
  }
  const p3 = ms.find(m => m.id === "p3");
  if (p3 && koRounds >= 2) {
    const semis = ms.filter(m => m.round === koRounds - 2 && m.id !== "p3").sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0));
    p3.teamA = semis[0] ? loser(semis[0]) : null;
    p3.teamB = semis[1] ? loser(semis[1]) : null;
  }
  return ms;
}

.stepper { display: flex; gap: 6px; }
.step-btn { width: 28px; height: 28px; background: #1e3a1e; border: 1px solid var(--border2); border-radius: 4px; color: #a0c0a0; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.step-btn:hover { background: var(--border2); color: var(--gold); }
.info-box { background: rgba(10,28,10,0.8); border: 1px solid var(--border2); border-left: 3px solid var(--gold); border-radius: 4px; padding: 12px 14px; margin-top: 12px; font-size: 13px; color: var(--green2); line-height: 1.8; }
.info-box strong { color: var(--gold); }

/* LIGA MODE */
.liga-app { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px;
  background-image: radial-gradient(ellipse at 20% 0%, rgba(34,85,34,0.2) 0%, transparent 55%), radial-gradient(ellipse at 80% 100%, rgba(180,120,0,0.1) 0%, transparent 50%); }

.mode-switch { display: flex; gap: 4px; margin-right: 12px; padding: 3px; background: rgba(10,28,10,0.8); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; }
.mode-btn { padding: 7px 14px; background: transparent; border: none; border-radius: 4px; color: var(--green2); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.mode-btn.active { background: var(--gold); color: #0e1a0e; }
.mode-btn:hover:not(.active) { color: var(--gold); }

.liga-section { padding: 24px 32px; }

.liga-header-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 12px 16px; background: rgba(10,28,10,0.7); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 18px; }
.liga-season-name { font-family: 'Permanent Marker', cursive; font-size: 22px; color: var(--gold); margin-right: auto; }
.liga-season-input { background: rgba(10,28,10,0.9); border: 1px solid var(--border2); border-radius: 4px; padding: 6px 10px; color: var(--text); font-family: 'Permanent Marker', cursive; font-size: 18px; outline: none; }
.liga-season-input:focus { border-color: var(--gold); }

.liga-grid { display: grid; gap: 18px; }
.league-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.league-header { background: rgba(10,28,10,0.9); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--border); border-top: 3px solid var(--gold); }
.league-header.l2 { border-top-color: #c0c0c0; }
.league-header.l3 { border-top-color: #cd7f32; }
.league-header.l4 { border-top-color: #888; }
.league-name { font-family: 'Permanent Marker', cursive; font-size: 24px; color: var(--gold); }
.league-name.l2 { color: #d8d8d8; }
.league-name.l3 { color: #cd7f32; }
.league-name.l4 { color: #aaa; }
.league-count { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; }

.liga-stand { width: 100%; border-collapse: collapse; font-size: 13px; }
.liga-stand th { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); font-size: 11px; padding: 8px 10px; text-align: center; border-bottom: 1px solid var(--border); }
.liga-stand th:nth-child(2) { text-align: left; }
.liga-stand td { padding: 9px 10px; text-align: center; border-bottom: 1px solid rgba(30,58,30,0.4); }
.liga-stand td:nth-child(2) { text-align: left; font-weight: 500; }
.liga-stand tr:last-child td { border-bottom: none; }
.liga-stand tr:hover td { background: rgba(46,90,46,0.1); }
.liga-rank-cell { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; color: var(--dim); width: 28px; }
.liga-pts-cell { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 22px; color: var(--gold); }
.liga-promote-row td { box-shadow: inset 3px 0 0 #6abf6a; }
.liga-relegate-row td { box-shadow: inset 3px 0 0 #bf6a6a; }
.liga-my-row { background: rgba(240,192,64,0.07); }
.liga-my-row td { box-shadow: inset 3px 0 0 var(--gold); font-weight: 700; }
.liga-rank-up { color: #6abf6a; font-size: 11px; margin-left: 4px; }
.liga-rank-down { color: #bf6a6a; font-size: 11px; margin-left: 4px; }
.liga-empty { padding: 30px 16px; text-align: center; color: var(--dim); font-style: italic; font-size: 13px; }

.liga-add-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.liga-add-input { flex: 1; min-width: 200px; background: rgba(10,28,10,0.8); border: 1px solid var(--border); border-radius: 4px; padding: 9px 12px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; outline: none; }
.liga-add-input:focus { border-color: var(--gold); }
.liga-add-btn { padding: 9px 18px; background: var(--gold); border: none; border-radius: 4px; color: #0e1a0e; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; }
.liga-add-btn:hover { opacity: 0.9; }
.liga-add-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.player-list { display: flex; flex-direction: column; gap: 6px; }
.player-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: rgba(10,28,10,0.6); border: 1px solid var(--border); border-radius: 4px; }
.player-name { flex: 1; font-size: 14px; }
.player-league-select { background: rgba(10,28,10,0.9); border: 1px solid var(--border2); border-radius: 3px; padding: 4px 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 12px; outline: none; cursor: pointer; }
.player-delete-btn { background: transparent; border: 1px solid #5a3030; color: #bf6a6a; padding: 4px 10px; border-radius: 3px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.12s; }
.player-delete-btn:hover { background: #3a1818; }

.match-entry-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 18px; margin-bottom: 18px; }
.match-entry-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: center; }
.match-entry-side { display: flex; flex-direction: column; gap: 8px; }
.match-entry-select { background: rgba(10,28,10,0.9); border: 1px solid var(--border2); border-radius: 4px; padding: 10px 12px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; outline: none; cursor: pointer; }
.match-entry-select:focus { border-color: var(--gold); }
.match-entry-cups { display: flex; align-items: center; gap: 6px; justify-content: center; }
.match-entry-cup-input { width: 60px; text-align: center; background: rgba(10,28,10,0.9); border: 1px solid var(--border2); border-radius: 4px; padding: 8px; color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; outline: none; }
.match-entry-cup-input:focus { border-color: var(--gold); }
.match-entry-vs { font-family: 'Permanent Marker', cursive; font-size: 28px; color: var(--gold); padding: 0 8px; }
.match-entry-winner { display: flex; gap: 8px; margin-top: 12px; justify-content: center; }
.match-entry-winner-btn { padding: 8px 16px; background: transparent; border: 1px solid var(--border2); border-radius: 4px; color: var(--green2); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.match-entry-winner-btn.active { background: #1a3a10; border-color: var(--gold); color: var(--gold); }
.match-entry-winner-btn:hover:not(.active) { border-color: #a0c040; color: #a0c040; }
.match-entry-submit { width: 100%; margin-top: 14px; padding: 12px; background: var(--gold); border: none; border-radius: 4px; color: #0e1a0e; font-family: 'Permanent Marker', cursive; font-size: 18px; cursor: pointer; transition: all 0.15s; letter-spacing: 1px; }
.match-entry-submit:hover { background: #ffd050; }
.match-entry-submit:disabled { opacity: 0.3; cursor: not-allowed; }

.match-history { display: flex; flex-direction: column; gap: 6px; max-height: 500px; overflow-y: auto; }
.match-hist-row { display: grid; grid-template-columns: 1fr auto 1fr auto; gap: 10px; align-items: center; padding: 8px 12px; background: rgba(10,28,10,0.6); border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
.match-hist-team { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.match-hist-team.right { text-align: right; }
.match-hist-team.winner { color: var(--gold); font-weight: 600; }
.match-hist-score { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; color: var(--text); padding: 0 6px; }
.match-hist-del { background: transparent; border: 1px solid #5a3030; color: #bf6a6a; padding: 3px 8px; border-radius: 3px; font-size: 11px; cursor: pointer; transition: all 0.12s; }
.match-hist-del:hover { background: #3a1818; }

.compare-table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.compare-table th { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); font-size: 12px; padding: 12px 10px; text-align: center; border-bottom: 2px solid var(--border); background: rgba(10,28,10,0.9); cursor: pointer; user-select: none; }
.compare-table th:nth-child(2) { text-align: left; }
.compare-table th:hover { color: var(--gold); }
.compare-table th.sort-active { color: var(--gold); }
.compare-table th.sort-active::after { content: " ▼"; font-size: 9px; }
.compare-table td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(30,58,30,0.4); }
.compare-table td:nth-child(2) { text-align: left; font-weight: 500; }
.compare-table tr:last-child td { border-bottom: none; }
.compare-table tr:hover td { background: rgba(46,90,46,0.1); }
.compare-rank { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; color: var(--dim); }
.compare-league-tag { display: inline-block; background: rgba(240,192,64,0.12); border: 1px solid #5a5020; color: var(--gold); padding: 1px 6px; border-radius: 3px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; margin-left: 8px; }

.liga-settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.danger-btn { padding: 12px 18px; background: transparent; border: 1px solid #5a3030; color: #bf6a6a; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.danger-btn:hover { background: #3a1818; color: #ff8a8a; }
.confirm-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
.confirm-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 28px; max-width: 420px; width: 100%; text-align: center; }
.confirm-card h3 { font-family: 'Permanent Marker', cursive; font-size: 24px; color: var(--gold); margin-bottom: 12px; }
.confirm-card p { color: var(--green2); margin-bottom: 20px; line-height: 1.6; }
.confirm-actions { display: flex; gap: 10px; justify-content: center; }

/* Open Pairings list */
.open-pairs-section { margin-top: 18px; }
.open-pair-league-title { font-family: 'Permanent Marker', cursive; font-size: 18px; color: var(--gold); margin: 14px 0 8px; padding-top: 12px; border-top: 1px solid var(--border); }
.open-pair-league-title:first-child { border-top: none; padding-top: 0; }
.open-pair-list { display: flex; flex-direction: column; gap: 6px; }
.open-pair-row { display: grid; grid-template-columns: 1fr auto 1fr auto; gap: 10px; align-items: center; padding: 9px 12px; background: rgba(10,28,10,0.5); border: 1px solid var(--border); border-radius: 4px; font-size: 13px; transition: all 0.15s; cursor: pointer; }
.open-pair-row:hover { border-color: var(--gold); background: rgba(46,90,46,0.1); }
.open-pair-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.open-pair-name.right { text-align: right; }
.open-pair-vs { color: var(--dim); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 1px; }
.open-pair-count { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 3px 8px; border-radius: 3px; }
.open-pair-count.full { background: rgba(106,191,106,0.15); border: 1px solid #3a5a30; color: #8bc34a; }
.open-pair-count.partial { background: rgba(240,192,64,0.12); border: 1px solid #5a5020; color: var(--gold); }
.open-pair-count.empty { background: rgba(191,106,106,0.12); border: 1px solid #5a3030; color: #ff8a8a; }
.open-pair-empty { padding: 14px; text-align: center; color: var(--dim); font-style: italic; font-size: 13px; }
.compare-tabs { display: flex; gap: 4px; margin-bottom: 14px; padding: 3px; background: rgba(10,28,10,0.5); border: 1px solid var(--border); border-radius: 6px; }
.compare-tab-btn { flex: 1; padding: 9px 14px; background: transparent; border: none; border-radius: 4px; color: var(--green2); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.compare-tab-btn.active { background: var(--gold); color: #0e1a0e; }
.compare-tab-btn:hover:not(.active) { color: var(--gold); }

/* H2H section */
.h2h-selectors { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; margin-bottom: 18px; align-items: center; }
@media (max-width: 768px) {
  .h2h-selectors { grid-template-columns: 1fr; gap: 8px; }
  .h2h-selectors .match-entry-vs { text-align: center; font-size: 20px; }
}
.h2h-vs-label { font-family: 'Permanent Marker', cursive; font-size: 26px; color: var(--gold); }
.h2h-bilanz { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
@media (max-width: 768px) {
  .h2h-bilanz { grid-template-columns: 1fr; gap: 12px; }
}
.h2h-side { background: rgba(10,28,10,0.6); border: 1px solid var(--border); border-radius: 6px; padding: 18px; text-align: center; }
.h2h-side.winner { border-color: var(--gold); background: rgba(240,192,64,0.05); }
.h2h-name { font-family: 'Permanent Marker', cursive; font-size: 22px; color: var(--gold); margin-bottom: 6px; word-break: break-word; }
.h2h-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
.h2h-stat { padding: 8px 4px; }
.h2h-stat-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); }
.h2h-stat-value { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 22px; color: var(--text); margin-top: 2px; }
.h2h-stat-value.gold { color: var(--gold); }
.h2h-summary { font-family: 'Permanent Marker', cursive; font-size: 36px; color: var(--gold); text-align: center; margin: 18px 0; padding: 16px; background: rgba(10,28,10,0.6); border-radius: 6px; border: 1px solid var(--border); }
.h2h-history-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin: 18px 0 8px; }
.h2h-empty { padding: 24px; text-align: center; color: var(--dim); font-style: italic; }

/* Avatars */
.avatar { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: white; font-size: 13px; flex-shrink: 0; overflow: hidden; background-size: cover; background-position: center; }
.avatar.sm { width: 24px; height: 24px; font-size: 11px; }
.avatar.lg { width: 80px; height: 80px; font-size: 32px; }
.avatar.xl { width: 120px; height: 120px; font-size: 48px; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.player-link { cursor: pointer; transition: color 0.12s; }
.player-link:hover { color: var(--gold); }

/* Form indicators */
.form-row { display: inline-flex; gap: 3px; margin-left: 8px; vertical-align: middle; }
.form-pill { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
.form-pill.W { background: #6abf6a; }
.form-pill.L { background: #bf6a6a; }
.form-pill.empty { background: #2e3a2e; }

/* Streak indicator */
.streak-badge { display: inline-flex; align-items: center; gap: 3px; padding: 1px 6px; border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; margin-left: 6px; }
.streak-badge.W { background: rgba(106,191,106,0.2); color: #8bc34a; }
.streak-badge.L { background: rgba(191,106,106,0.2); color: #ff8a8a; }

/* Profile page */
.profile-header { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 18px; display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
.profile-info { flex: 1; min-width: 200px; }
.profile-name { font-family: 'Permanent Marker', cursive; font-size: 32px; color: var(--gold); margin-bottom: 4px; }
.profile-meta { color: var(--green2); font-size: 13px; margin-bottom: 8px; }
.profile-back { padding: 6px 14px; background: transparent; border: 1px solid var(--border2); color: var(--green); border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.profile-back:hover { border-color: var(--gold); color: var(--gold); }

.profile-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
.profile-stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 18px; }
.profile-stat-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
.profile-stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.profile-stat-mini { text-align: center; padding: 8px 4px; }
.profile-stat-mini-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); }
.profile-stat-mini-value { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 22px; color: var(--text); margin-top: 2px; }
.profile-stat-mini-value.gold { color: var(--gold); }

/* Achievements */
.ach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.ach-card { background: rgba(10,28,10,0.6); border: 1px solid var(--border); border-radius: 6px; padding: 12px; text-align: center; transition: all 0.15s; position: relative; }
.ach-card.earned { border-color: var(--gold); background: rgba(240,192,64,0.06); }
.ach-card.locked { opacity: 0.4; filter: grayscale(0.7); }
.ach-icon { font-size: 32px; line-height: 1; margin-bottom: 6px; }
.ach-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; color: var(--text); margin-bottom: 4px; }
.ach-desc { font-size: 11px; color: var(--green2); line-height: 1.3; }
.ach-card.earned .ach-name { color: var(--gold); }

/* Compact achievement badges (in profile header etc) */
.ach-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.ach-badge-mini { width: 28px; height: 28px; border-radius: 50%; background: rgba(240,192,64,0.15); border: 1px solid var(--border2); display: inline-flex; align-items: center; justify-content: center; font-size: 16px; cursor: help; }

/* Avatar upload */
.avatar-upload { position: relative; }
.avatar-upload-input { display: none; }
.avatar-upload-label { cursor: pointer; display: inline-block; }
.avatar-upload-label:hover .avatar { box-shadow: 0 0 0 2px var(--gold); }
.avatar-upload-edit { position: absolute; bottom: 0; right: 0; background: var(--gold); color: #0e1a0e; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid var(--bg); }

/* Hall of Fame */
.hof-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.hof-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.hof-card.tournament { border-top: 3px solid var(--gold); }
.hof-card.league { border-top: 3px solid #c0c0c0; }
.hof-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.hof-title { font-family: 'Permanent Marker', cursive; font-size: 24px; color: var(--gold); }
.hof-card.league .hof-title { color: #d8d8d8; }
.hof-subtitle { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-top: 2px; }
.hof-list { padding: 8px; }
.hof-entry { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 6px; margin-bottom: 4px; transition: background 0.12s; }
.hof-entry:hover { background: rgba(46,90,46,0.08); }
.hof-year { font-family: 'Permanent Marker', cursive; font-size: 22px; color: var(--gold); min-width: 80px; }
.hof-card.league .hof-year { color: #d8d8d8; }
.hof-winner-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; color: var(--text); }
.hof-empty { padding: 24px; text-align: center; color: var(--dim); font-style: italic; font-size: 13px; }

.setup-field input { width: 100%; background: rgba(10,28,10,0.9); border: 1px solid var(--border2); border-radius: 4px; padding: 11px 14px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; outline: none; }

/* Role indicator */

.sync-live { background: rgba(106,191,106,0.15); border: 1px solid #3a5a30; color: #8bc34a; }
.sync-offline { background: rgba(191,106,106,0.15); border: 1px solid #5a3030; color: #ff8a8a; }
.sync-connecting { background: rgba(240,192,64,0.12); border: 1px solid #5a5020; color: var(--gold); }
.role-badge { padding: 5px 10px; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.role-admin { background: rgba(240,192,64,0.18); border: 1px solid #5a5020; color: var(--gold); }
.role-editor { background: rgba(106,191,106,0.15); border: 1px solid #3a5a30; color: #8bc34a; }
.role-viewer { background: rgba(90,138,90,0.12); border: 1px solid var(--border); color: var(--green2); }
.login-btn { padding: 5px 12px; background: transparent; border: 1px solid var(--border2); color: var(--green2); border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.login-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Archive */

@media (max-width: 700px) {

@media (max-width: 700px) {

/* TOURNAMENTS HUB */

.tournament-card-body { padding: 14px 18px; }
.tournament-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-right: 6px; margin-bottom: 6px; }
.tournament-badge.format { background: rgba(240,192,64,0.12); border: 1px solid #5a5020; color: var(--gold); }

.tournament-card-footer { padding: 10px 18px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.tournament-card-date { color: var(--dim); font-size: 12px; }
.tournament-new-card { background: rgba(10,28,10,0.4); border: 2px dashed var(--border2); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 40px 20px; cursor: pointer; transition: all 0.15s; min-height: 180px; }
.tournament-new-card:hover { border-color: var(--gold); background: rgba(46,90,46,0.1); }

.wizard-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; overflow-y: auto; }
.wizard-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 28px; max-width: 560px; width: 100%; }
.wizard-title { font-family: 'Permanent Marker', cursive; font-size: 28px; color: var(--gold); margin-bottom: 6px; }

.wizard-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.wizard-option { padding: 14px; background: rgba(10,28,10,0.6); border: 2px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.15s; text-align: center; }
.wizard-option:hover { border-color: var(--gold); }
.wizard-option.selected { border-color: var(--gold); background: rgba(240,192,64,0.08); }
.wizard-option-icon { font-size: 28px; margin-bottom: 6px; }
.wizard-option-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; color: var(--text); }
.wizard-option-desc { font-size: 11px; color: var(--dim); margin-top: 3px; }
.wizard-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }

/* PRIZE MONEY */
.prize-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.prize-input-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.prize-input { width: 90px; background: rgba(10,28,10,0.9); border: 1px solid var(--border2); border-radius: 4px; padding: 8px 10px; color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; text-align: center; outline: none; }
.prize-input:focus { border-color: var(--gold); }
.prize-summary { background: rgba(10,28,10,0.85); border: 1px solid var(--border2); border-radius: 4px; padding: 16px; margin-top: 14px; }
.prize-summary-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
.prize-summary-row.total { border-top: 1px solid var(--border2); margin-top: 8px; padding-top: 14px; font-size: 18px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
.prize-summary-row.total .label { color: var(--gold); letter-spacing: 1px; text-transform: uppercase; }
.prize-summary-row.total .val { color: var(--gold); font-size: 26px; }
.prize-podium-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 8px; }
.prize-podium-card { background: rgba(20,40,20,0.7); border: 1px solid var(--border); border-radius: 6px; padding: 22px 16px; text-align: center; position: relative; }
.prize-podium-card.gold { border-top: 3px solid #f0c040; }
.prize-podium-card.silver { border-top: 3px solid #c0c0c0; }
.prize-podium-card.bronze { border-top: 3px solid #cd7f32; }

.prize-podium-team { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; color: var(--text); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

/* TV PRIZE */
.share-warn { color: #bf6a6a; font-size: 12px; margin-top: 6px; }
.share-ok { color: #6abf6a; font-size: 12px; margin-top: 6px; }
.warn { color: var(--gold); font-size: 12px; margin-top: 6px; }
.tv-prize-wrap { display: flex; flex-direction: column; align-items: center; gap: 32px; padding: 20px; }
.tv-prize-pot {
  background: rgba(12,24,12,0.85);

}

.tv-prize-pot-value { font-family: 'Permanent Marker', cursive; font-size: 72px; color: #f0c040; text-shadow: 0 4px 30px rgba(240,192,64,0.4); margin-top: 8px; }

}

.tv-prize-card.silver { border-top: 4px solid #c0c0c0; }
.tv-prize-card.bronze { border-top: 4px solid #cd7f32; }
.tv-prize-medal { font-size: 64px; line-height: 1; }
.tv-prize-place { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #5a8a5a; margin-top: 14px; }
.tv-prize-amount { font-family: 'Permanent Marker', cursive; font-size: 56px; color: #f0c040; margin-top: 12px; text-shadow: 0 4px 18px rgba(240,192,64,0.35); }

.tv-prize-team { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: #e8f0e8; margin-top: 16px; padding-top: 16px; border-top: 1px solid #1e3a1e; min-height: 50px; }
.tv-prize-team.tbd { color: #2e5a2e; font-style: italic; font-weight: 400; }

/* CHAMPION OVERLAY — PODIUM */
@keyframes champFade {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes logoFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes revealPop {
  0% { opacity: 0; transform: scale(0.5); }
  60% { opacity: 1; transform: scale(1.15); }
  100% { transform: scale(1); }
}
@keyframes shimmer {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
@keyframes confetti {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(120vh) rotate(720deg); opacity: 0.4; }
}

.podium-overlay {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, rgba(20,40,20,0.97) 0%, #060e06 75%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  z-index: 100;
  padding: 24px;
  animation: champFade 0.6s ease-out;
  overflow: auto;
}

.podium-close {
  position: absolute; top: 20px; right: 20px;
  background: transparent;
  border: 1px solid #2e5a2e;
  border-radius: 4px;
  color: #5a8a5a;
  padding: 8px 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer;
  z-index: 102;
}
.podium-close:hover { border-color: #f0c040; color: #f0c040; }

.podium-header { display: flex; flex-direction: column; align-items: center; gap: 14px; margin-bottom: 28px; margin-top: 8px; }
.podium-logo { height: 130px; width: auto; filter: drop-shadow(0 4px 30px rgba(240,192,64,0.4)); animation: logoFloat 4s ease-in-out infinite; }
.podium-stars { font-size: 30px; letter-spacing: 14px; filter: drop-shadow(0 4px 16px rgba(240,192,64,0.5)); }

.podium-title-area { text-align: center; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.podium-pretitle {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 700; letter-spacing: 6px;
  color: #5a8a5a; text-transform: uppercase;
}
.podium-title-revealed {
  font-family: 'Permanent Marker', cursive;
  font-size: 64px; color: #f0c040;
  letter-spacing: 5px; text-transform: uppercase;
  text-shadow: 0 4px 30px rgba(240,192,64,0.7);
  animation: revealPop 0.8s ease-out;
  line-height: 1.1;
}

.podium-stage {
  display: grid;
  grid-template-columns: 1fr 1.2fr 1fr;
  gap: 12px;
  align-items: end;
  width: 100%;
  max-width: 900px;
  margin-top: 32px;
}

.podium-step {
  position: relative;
  display: flex; flex-direction: column;
  align-items: center;
  cursor: pointer;
  user-select: none;
  transition: transform 0.2s;
}
.podium-step.revealed { cursor: default; }
.podium-step.locked:hover { transform: translateY(-4px); }

.podium-medal-area {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 16px;
  text-align: center;
}
.podium-medal { font-size: 56px; line-height: 1; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4)); }
.podium-place-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 3px;
  color: #5a8a5a; text-transform: uppercase;
  margin-top: 6px;
}
.podium-prize {
  font-family: 'Permanent Marker', cursive;
  font-size: 36px; color: #f0c040;
  margin-top: 4px;
  text-shadow: 0 2px 16px rgba(240,192,64,0.4);
}

.podium-team-name {
  font-family: 'Permanent Marker', cursive;
  font-size: 28px; color: #fff;
  text-shadow: 0 0 24px rgba(240,192,64,0.7);
  letter-spacing: 2px;
  text-align: center;
  padding: 0 8px;
  word-break: break-word;
  line-height: 1.15;
  animation: revealPop 0.7s ease-out;
}

.podium-tap-prompt {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 3px;
  color: #f0c040;
  text-transform: uppercase;
  text-align: center;
  animation: shimmer 1.6s ease-in-out infinite;
}
.podium-tap-q { font-size: 48px; color: #f0c040; line-height: 1; margin-bottom: 8px; }

.podium-block {
  width: 100%;

.podium-block.gold { border-top-color: #f0c040; height: 240px; box-shadow: 0 -8px 40px rgba(240,192,64,0.18); }

.podium-block.locked {

}

.podium-rank-num {

.confetti-piece {

@media (max-width: 700px) {
  .podium-logo { height: 90px; }
  .podium-title-revealed { font-size: 40px; }
  .podium-pretitle { font-size: 13px; }
  .podium-medal { font-size: 40px; }

/* RULES */
.rules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
.rule-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 18px 20px; position: relative; border-left: 3px solid var(--gold); }
.rule-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.rule-num { font-family: 'Permanent Marker', cursive; font-size: 22px; color: var(--gold); min-width: 28px; }
.rule-icon { font-size: 22px; }
.rule-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 1px; text-transform: uppercase; color: #e8f0e8; }
.rule-text { font-size: 13px; line-height: 1.65; color: var(--green2); white-space: pre-wrap; }
.rules-intro { font-family: 'Permanent Marker', cursive; font-size: 26px; color: var(--gold); margin-bottom: 18px; text-align: center; padding: 10px 0; }

/* TV RULES */
.tv-rules-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 18px; height: 100%; align-content: start; overflow-y: auto; }
.tv-rule-card { background: rgba(12,24,12,0.85); border: 1px solid #1e3a1e; border-radius: 8px; padding: 16px 20px; border-left: 4px solid #f0c040; }
.tv-rule-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.tv-rule-num { font-family: 'Permanent Marker', cursive; font-size: 26px; color: #f0c040; min-width: 32px; }
.tv-rule-icon { font-size: 26px; }
.tv-rule-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 1.5px; text-transform: uppercase; color: #e8f0e8; }
.tv-rule-text { font-size: 15px; line-height: 1.6; color: #a0c0a0; white-space: pre-wrap; }
.big-btn { width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: 4px; color: #0e1a0e; font-family: 'Permanent Marker', cursive; font-size: 20px; cursor: pointer; transition: all 0.15s; margin-top: 16px; }
.big-btn:hover { background: #ffd050; transform: translateY(-1px); }
.big-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* NAMES */
.names-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.input-list { display: grid; gap: 5px; max-height: 480px; overflow-y: auto; padding-right: 4px; }
.name-row { display: flex; align-items: center; gap: 8px; }
.name-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; color: var(--dim); width: 22px; text-align: right; flex-shrink: 0; }
.name-input { flex: 1; background: rgba(10,28,10,0.9); border: 1px solid var(--border); border-radius: 4px; padding: 8px 11px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px; outline: none; transition: border-color 0.15s; }
.name-input:focus { border-color: var(--gold); }
.name-input::placeholder { color: var(--dim); }
.demo-btn { padding: 7px 14px; background: transparent; border: 1px solid var(--border2); border-radius: 4px; color: var(--green); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; margin-top: 8px; font-family: 'Barlow', sans-serif; }
.demo-btn:hover { border-color: var(--gold); color: var(--gold); }

/* GROUPS ADMIN */
.groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(460px, 1fr)); gap: 20px; }
.group-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.group-header { background: rgba(10,28,10,0.9); padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--border); }
.group-name-label { font-family: 'Permanent Marker', cursive; font-size: 22px; color: var(--gold); }
.group-progress { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; }

/* standings */
.standings { width: 100%; border-collapse: collapse; font-size: 13px; }
.standings th { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); font-size: 11px; padding: 7px 10px; text-align: center; border-bottom: 1px solid var(--border); }
.standings th:nth-child(2) { text-align: left; }
.standings td { padding: 8px 10px; text-align: center; border-bottom: 1px solid rgba(30,58,30,0.4); }
.standings td:nth-child(2) { text-align: left; }
.standings tr:last-child td { border-bottom: none; }
.standings tr:hover td { background: rgba(46,90,46,0.1); }
.rank-cell { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; color: var(--dim); width: 22px; }
.pts-cell { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; color: var(--gold); }
.diff-pos { color: #6abf6a; } .diff-neg { color: #bf6a6a; } .diff-neu { color: var(--green); }
.q-badge { display: inline-block; background: var(--gold); color: #0e1a0e; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 9px; padding: 1px 4px; border-radius: 2px; letter-spacing: 0.5px; margin-left: 5px; }

/* matches */
.matches-section { padding: 0 16px 14px; }
.matches-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); padding: 12px 0 8px; border-top: 1px solid var(--border); margin-top: 2px; }
.match-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid rgba(30,58,30,0.35); }
.match-row:last-child { border-bottom: none; }
.match-team-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.match-team-name.right { text-align: right; }
.match-team-name.winner-name { color: var(--gold); font-weight: 600; }
.match-center { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
.cup-inputs { display: flex; align-items: center; gap: 3px; }
.mini-stepper { display: flex; align-items: center; gap: 2px; }
.mini-btn { width: 20px; height: 20px; background: #1e3a1e; border: 1px solid var(--border2); border-radius: 3px; color: var(--green2); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; flex-shrink: 0; }
.mini-btn:hover { background: var(--border2); color: var(--gold); }
.mini-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; min-width: 26px; text-align: center; }
.mini-input { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; width: 38px; text-align: center; background: rgba(10,28,10,0.9); border: 1px solid var(--border2); border-radius: 3px; color: var(--text); padding: 2px 0; outline: none; -moz-appearance: textfield; }
.mini-input::-webkit-outer-spin-button, .mini-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.mini-input:focus { border-color: var(--gold); }
.ko-cup-input { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; width: 36px; text-align: center; background: rgba(10,28,10,0.9); border: 1px solid var(--border2); border-radius: 3px; color: var(--text); padding: 2px 0; outline: none; -moz-appearance: textfield; }
.ko-cup-input::-webkit-outer-spin-button, .ko-cup-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.ko-cup-input:focus { border-color: var(--gold); }
.sep { color: var(--dim); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; padding: 0 1px; }
.winner-btns { display: flex; gap: 4px; }
.win-btn { padding: 3px 7px; border-radius: 3px; border: 1px solid var(--border2); background: transparent; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: var(--green); cursor: pointer; transition: all 0.12s; text-transform: uppercase; white-space: nowrap; }
.win-btn.active { background: #1a3a10; border-color: var(--gold); color: var(--gold); }
.win-btn:hover:not(.active) { border-color: #a0c040; color: #a0c040; }

/* KO ADMIN */
.ko-scroll { overflow-x: auto; padding-bottom: 10px; }
.bracket { display: flex; gap: 0; align-items: stretch; min-width: 600px; }
.ko-round { display: flex; flex-direction: column; flex: 1; min-width: 160px; }
.ko-round-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); text-align: center; padding: 9px 6px; border-bottom: 1px solid var(--border); background: rgba(10,28,10,0.6); border-right: 1px solid var(--border); }
.ko-round:last-child .ko-round-title { border-right: none; }
.ko-matches-col { display: flex; flex-direction: column; justify-content: space-around; flex: 1; padding: 10px 6px; gap: 10px; border-right: 1px solid var(--border); }
.ko-round:last-child .ko-matches-col { border-right: none; }
.ko-match { background: rgba(10,28,10,0.8); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.ko-team { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-bottom: 1px solid #1a3a1a; gap: 6px; min-height: 34px; transition: background 0.1s; }
.ko-team:last-child { border-bottom: none; }
.ko-team.winner-team { background: rgba(30,80,10,0.35); }
.ko-team.tbd { color: var(--dim); font-style: italic; font-size: 11px; }
.ko-team-name { flex: 1; font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ko-team-name.w { color: var(--gold); font-weight: 600; }
.ko-cup-ctrl { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.ko-cup-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; min-width: 22px; text-align: center; }

.champion-box { text-align: center; padding: 24px 20px 16px; border-top: 2px solid var(--gold); margin-top: 20px; }
.champ-emoji { font-size: 48px; }
.champ-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--green); margin-top: 8px; }
.champ-name { font-family: 'Permanent Marker', cursive; font-size: 40px; color: var(--gold); text-shadow: 0 2px 20px rgba(240,192,64,0.4); margin-top: 4px; }

/* ═══════════════════════════════════════════════════════
   DISPLAY / TV MODE
═══════════════════════════════════════════════════════ */
.display-app {
  min-height: 100vh;
  background: #060e06;
  color: #e8f0e8;
  font-family: 'Barlow', sans-serif;
  background-image:
    radial-gradient(ellipse at 15% 0%, rgba(20,60,20,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 100%, rgba(120,80,0,0.15) 0%, transparent 50%);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.display-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 48px 16px;
  border-bottom: 2px solid #1e3a1e;
  background: rgba(6,14,6,0.9);
  flex-shrink: 0;
}

.display-logo { font-family: 'Permanent Marker', cursive; font-size: 36px; color: #f0c040; text-shadow: 0 2px 16px rgba(240,192,64,0.3); }
.display-logo span { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 3px; color: #3a6a3a; margin-left: 14px; vertical-align: middle; text-transform: uppercase; }
.display-logo-img { height: 110px; width: auto; display: block; filter: drop-shadow(0 4px 24px rgba(0,0,0,0.5)); }
.display-logo-row { display: flex; align-items: center; gap: 22px; }
.display-tagline { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; line-height: 1.4; }

.display-switch { display: flex; gap: 0; }
.display-tab {
  padding: 8px 20px;
  background: none; border: 1px solid #1e3a1e;
  color: #3a6a3a;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s;
}
.display-tab:first-child { border-radius: 4px 0 0 4px; }
.display-tab:last-child { border-radius: 0 4px 4px 0; }
.display-tab.active { background: #f0c040; border-color: #f0c040; color: #060e06; }

.display-body { flex: 1; overflow: hidden; padding: 28px 48px 24px; display: flex; flex-direction: column; }

/* TV GROUPS */
.tv-groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  height: 100%;
  align-content: start;
}

.tv-group-card {
  background: rgba(12,24,12,0.85);
  border: 1px solid #1e3a1e;
  border-radius: 8px;
  overflow: hidden;
  border-top: 3px solid #f0c040;
}

.tv-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: rgba(6,14,6,0.7);
  border-bottom: 1px solid #1e3a1e;
}

.tv-group-name { font-family: 'Permanent Marker', cursive; font-size: 28px; color: #f0c040; }
.tv-group-progress { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: #3a6a3a; letter-spacing: 1px; }

.tv-standings { width: 100%; border-collapse: collapse; }
.tv-standings th {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: #3a6a3a; font-size: 11px;
  padding: 8px 16px; text-align: center;
  border-bottom: 1px solid #1e3a1e;
}
.tv-standings th:nth-child(2) { text-align: left; }
.tv-standings td { padding: 11px 16px; text-align: center; border-bottom: 1px solid rgba(30,58,30,0.3); font-size: 15px; }
.tv-standings td:nth-child(2) { text-align: left; font-size: 16px; font-weight: 500; }
.tv-standings tr:last-child td { border-bottom: none; }
.tv-standings tr:hover td { background: rgba(46,90,46,0.08); }
.tv-rank { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; color: #2e5a2e; }
.tv-pts { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 24px; color: #f0c040; }
.tv-diff-pos { color: #6abf6a; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
.tv-diff-neg { color: #bf6a6a; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
.tv-diff-neu { color: #5a8a5a; font-family: 'Barlow Condensed', sans-serif; }
.tv-q { display: inline-block; background: #f0c040; color: #060e06; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 10px; padding: 2px 5px; border-radius: 2px; margin-left: 6px; letter-spacing: 0.5px; }

/* TV BRACKET */
.tv-bracket-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.tv-bracket { display: flex; flex: 1; gap: 0; align-items: stretch; overflow-x: auto; }

.tv-ko-round { display: flex; flex-direction: column; flex: 1; min-width: 200px; }
.tv-round-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
  color: #3a6a3a; text-align: center;
  padding: 10px; border-bottom: 1px solid #1e3a1e;
  background: rgba(6,14,6,0.8);
  border-right: 1px solid #1e3a1e;
}
.tv-ko-round:last-child .tv-round-title { border-right: none; }

.tv-ko-matches-col {
  display: flex; flex-direction: column;
  justify-content: space-around;
  flex: 1; padding: 16px 10px; gap: 14px;
  border-right: 1px solid #1e3a1e;
}
.tv-ko-round:last-child .tv-ko-matches-col { border-right: none; }

.tv-ko-match {
  background: rgba(10,22,10,0.9);
  border: 1px solid #1e3a1e;
  border-radius: 6px;
  overflow: hidden;
}

.tv-ko-team {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid #1a3a1a;
  min-height: 48px; gap: 10px;
}
.tv-ko-team:last-child { border-bottom: none; }
.tv-ko-team.tv-winner { background: rgba(24,70,8,0.5); }
.tv-ko-team.tv-tbd { opacity: 0.35; }

.tv-ko-name { font-size: 16px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tv-ko-name.w { color: #f0c040; font-weight: 700; }
.tv-ko-score {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 28px; color: #e8f0e8;
  min-width: 32px; text-align: right; flex-shrink: 0;
}
.tv-ko-score.w { color: #f0c040; }

.tv-champion {
  text-align: center; padding: 20px;
  background: rgba(12,24,12,0.9);
  border: 1px solid #1e3a1e; border-top: 3px solid #f0c040;
  border-radius: 8px; margin-top: 20px; flex-shrink: 0;
}
.tv-champ-trophy { font-size: 44px; }
.tv-champ-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 4px; color: #3a6a3a; text-transform: uppercase; margin-top: 6px; }
.tv-champ-name { font-family: 'Permanent Marker', cursive; font-size: 48px; color: #f0c040; text-shadow: 0 2px 30px rgba(240,192,64,0.5); }

.no-data { display: flex; align-items: center; justify-content: center; flex: 1; font-family: 'Permanent Marker', cursive; font-size: 28px; color: #1e3a1e; }

@media (max-width: 700px) {
  .content { padding: 14px; }
  .header { padding: 14px 14px 0; }
  .setup-grid, .names-layout { grid-template-columns: 1fr; }
  .groups-grid { grid-template-columns: 1fr; }
}

/* ═══════════════════════════════════════════════════════════
   MOBILE-FIRST OVERRIDES (max-width: 768px)
   ═══════════════════════════════════════════════════════════ */
@media (max-width: 768px) {

  /* ── Bottom nav padding so content isn't hidden ── */
  .liga-app-root, .admin-app-root { padding-bottom: 72px; }
  #root > div { padding-bottom: 72px; }

  /* ── Header: kompakter ── */
  .header {
    padding: 10px 14px 0;
    gap: 8px;
    flex-wrap: nowrap;
    align-items: center;
  }
  .logo-img { height: 46px; padding-bottom: 0; margin-bottom: 0; }
  .logo-tagline { font-size: 9px; letter-spacing: 2px; padding-bottom: 8px; }
  .header-right { gap: 6px; flex-wrap: nowrap; align-items: center; margin-left: auto; }

  /* Tabs in Header verstecken — Bottom Nav übernimmt */
  .tabs { display: none !important; }
  .display-btn { display: none !important; }

  /* Mode switch bleibt aber kompakter */
  .mode-switch { gap: 4px; }
  .mode-btn { padding: 5px 10px; font-size: 12px; }

  /* Login-Button kompakter */
  .login-btn { padding: 6px 10px; font-size: 12px; }

  /* Sync-Badge kompakter */
  .sync-badge { padding: 4px 8px; font-size: 11px; }

  /* ── Content padding ── */
  .content { padding: 12px; }
  .liga-section { padding: 12px; }

  /* ── Touch Targets: alles ≥ 44px ── */
  button, .tab, select, input[type="checkbox"],
  .player-link, .match-hist-del, .step-btn,
  .win-btn, .mini-btn, .big-btn, .demo-btn,
  .danger-btn, .hof-add-btn, .liga-add-btn,
  .match-entry-winner-btn, .match-hist-del { min-height: 44px; }

  .big-btn { min-height: 50px; font-size: 16px !important; }

  /* ── Cards ── */
  .card { padding: 14px; border-radius: 6px; }
  .card-title { font-size: 16px; margin-bottom: 14px; }

  /* ── Standings Tabelle: horizontal scrollbar ── */
  .liga-stand { min-width: 420px; font-size: 13px; }
  .liga-stand th, .liga-stand td { padding: 8px 6px; }
  .liga-stand-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* ── Match Entry: größere Becher-Buttons ── */
  .match-entry-cup-input {
    font-size: 28px !important;
    padding: 10px;
    width: 70px;
    text-align: center;
  }
  .match-entry-cups { gap: 8px; justify-content: center; }
  .match-entry-row { gap: 8px; }
  .match-entry-side { gap: 10px; }
  .match-entry-select { font-size: 15px !important; padding: 12px 10px; }
  .match-entry-winner { gap: 8px; }
  .match-entry-winner-btn { min-height: 50px; font-size: 15px !important; padding: 12px; border-radius: 6px; }
  .match-entry-submit { min-height: 54px; font-size: 20px !important; border-radius: 6px; }
  .match-entry-vs { font-size: 20px; padding: 8px 4px; }

  /* ── Ko-Bracket: scrollbar ── */
  .ko-bracket-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }

  /* ── Spielerliste ── */
  .player-row { flex-wrap: wrap; gap: 8px; padding: 10px; min-height: 56px; }
  .player-name { font-size: 15px; }

  /* ── Profil ── */
  .profile-back { min-height: 44px; padding: 10px 14px; font-size: 14px; }

  /* ── Open pairs ── */
  .open-pair-row { min-height: 48px; padding: 10px 8px; font-size: 14px; }

  /* ── Match history ── */
  .match-hist-row { padding: 10px 8px; min-height: 48px; gap: 6px; font-size: 13px; }
  .match-hist-del { min-height: 38px; width: 38px; }

  /* ── HOF ── */
  .hof-grid { grid-template-columns: 1fr; }

  /* ── Compare table ── */
  .compare-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .compare-table { min-width: 600px; font-size: 13px; }

  /* ── Confirm modals ── */
  .confirm-card { max-width: 95vw; padding: 20px 16px; }

  /* ── Achievements Grid ── */
  .ach-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .ach-card { padding: 8px 6px; }
  .ach-icon { font-size: 22px; }
  .ach-name { font-size: 10px; }
  .ach-desc { font-size: 9px; }

  /* ── Turnier-Hub ── */
  .tournaments-grid { grid-template-columns: 1fr; }
  .wizard-options { grid-template-columns: 1fr 1fr; }
}

/* ── BOTTOM NAVIGATION BAR ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 64px;
  background: rgba(10, 22, 10, 0.97);
  border-top: 1px solid var(--border);
  display: none; /* hidden on desktop */
  align-items: stretch;
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding-bottom: env(safe-area-inset-bottom);
}
.bottom-nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
